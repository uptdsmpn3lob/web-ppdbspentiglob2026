<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PPDB SMP Negeri 1 Harapan</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel Standalone (Untuk kompilasi JSX langsung di browser) -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- FontAwesome Icons (Jauh lebih stabil, anti-crash dibanding Lucide React UMD) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Supabase JS -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 antialiased selection:bg-blue-200">
    
    <!-- Wadah Aplikasi React -->
    <div id="root"></div>

    <!-- Script Utama Aplikasi PPDB -->
    <script type="text/babel">
        const { useState, useEffect } = React;

        // ====================================================================
        // KODE KONEKSI SUPABASE (SILAKAN PASTE KREDENSIAL ANDA DI SINI)
        // ====================================================================
        const SUPABASE_URL = "https://znqierrefwmndomvseen.supabase.co"; // Ganti dengan Project URL Anda
        const SUPABASE_ANON_KEY = "sb_publishable_ujuhkRfmriHZc5ZPBdzfAg_7Pnbrbej";       // Ganti dengan Anon Key Anda
        // ====================================================================

        let supabase = null;

        // Komponen Helper Icon Pengganti Lucide untuk menjamin kestabilan render
        function Icon({ name, className = "", size = 20 }) {
            const iconMap = {
                GraduationCap: "fa-graduation-cap",
                Users: "fa-users",
                UserCheck: "fa-user-check",
                FileCheck: "fa-file-circle-check",
                BookOpen: "fa-book-open",
                Calendar: "fa-calendar-days",
                MapPin: "fa-map-pin",
                Phone: "fa-phone",
                Mail: "fa-envelope",
                FileText: "fa-file-lines",
                Upload: "fa-cloud-arrow-up",
                CheckCircle: "fa-circle-check",
                LogOut: "fa-right-from-bracket",
                User: "fa-user",
                Home: "fa-house",
                ImageIcon: "fa-image",
                AlertCircle: "fa-circle-exclamation",
                Trash2: "fa-trash-can",
                Download: "fa-download",
                Eye: "fa-eye",
                Printer: "fa-print",
                Search: "fa-magnifying-glass",
                Filter: "fa-filter",
                ArrowUpDown: "fa-arrows-up-down",
                Shield: "fa-shield-halved",
                Settings: "fa-gears",
                Sliders: "fa-sliders",
                Check: "fa-check",
                X: "fa-xmark"
            };

            const faClass = iconMap[name] || "fa-question";
            return <i className={`fa-solid ${faClass} ${className}`} style={{ fontSize: `${size}px` }}></i>;
        }

        function App() {
            // STATE KONEKSI SUPABASE
            const [isDbConnected, setIsDbConnected] = useState(false);

            // STATE ROUTING & AUTH
            const [currentView, setCurrentView] = useState('landing'); 
            const [user, setUser] = useState(null); 
            const [selectedRole, setSelectedRole] = useState('siswa'); 

            // STATE DASHBOARD SISWA & ADMIN
            const [activeTab, setActiveTab] = useState('ringkasan');
            const [adminActiveTab, setAdminActiveTab] = useState('overview');
            const [isLoading, setIsLoading] = useState(false);

            // STATE CONFIG/SETTINGS SYSTEM
            const [systemSettings, setSystemSettings] = useState({
                schoolName: 'SMP NEGERI 1 HARAPAN',
                schoolLogo: '',
                academicYear: '2026/2027',
                quota: 250,
                whatsapp: '08123456789',
                email: 'ppdb@smpn1harapan.sch.id',
                address: 'Jl. Pendidikan No. 123, Kota Cerdas',
                isOpen: true
            });

            // STATE JALUR PPDB
            const [jalurList, setJalurList] = useState([
                { id: 'zonasi', nama: 'Zonasi', kuota: 125, kuotaPersen: '50%', desc: 'Berdasarkan radius jarak domisili terdekat dengan sekolah.', aktif: true },
                { id: 'prestasi', nama: 'Prestasi', kuota: 75, kuotaPersen: '30%', desc: 'Menggunakan nilai rapor atau prestasi akademik/non-akademik.', aktif: true },
                { id: 'afirmasi', nama: 'Afirmasi', kuota: 38, kuotaPersen: '15%', desc: 'Diperuntukkan pendaftar dari keluarga tidak mampu pemegang KIP/PKH.', aktif: true },
                { id: 'pindahan', nama: 'Perpindahan Orang Tua', kuota: 12, kuotaPersen: '5%', desc: 'Diperuntukkan pendaftar yang orang tuanya pindah tugas dinas.', aktif: true }
            ]);

            // STATE FORM BIODATA SISWA
            const [biodata, setBiodata] = useState({
                namaLengkap: 'RIZKY RAMADHAN', nisn: '0112345678', nik: '3201234567890001', 
                tempatLahir: 'Kota Cerdas', tanggalLahir: '2013-10-12', jenisKelamin: 'Laki-laki', 
                agama: 'Islam', anakKe: '1', jumlahSaudara: '2', kewarganegaraan: 'WNI',
                provinsi: 'Jawa Barat', kabupaten: 'Bandung', kecamatan: 'Cicendo', 
                desa: 'Pasirkaliki', rt: '02', rw: '05', kodePos: '40171', 
                alamatLengkap: 'Jl. Melati No. 45, RT 02 RW 05, Pasirkaliki',
                namaSekolahAsal: 'SDN 01 Kota Cerdas', npsn: '20102030', alamatSekolahAsal: 'Jl. Belajar No. 1, Kota Cerdas',
                namaAyah: 'Budi Santoso', nikAyah: '3201234567890002', pendidikanAyah: 'S1', 
                pekerjaanAyah: 'Karyawan Swasta', penghasilanAyah: '5.000.000',
                namaIbu: 'Siti Aminah', nikIbu: '3201234567890003', pendidikanIbu: 'SMA', 
                pekerjaanIbu: 'Ibu Rumah Tangga', penghasilanIbu: '0',
                namaWali: '', hubunganWali: '', noHpWali: ''
            });

            // STATE PORTAL PENGUMUMAN
            const [searchNoPendaftaran, setSearchNoPendaftaran] = useState('');
            const [searchTanggalLahir, setSearchTanggalLahir] = useState('');
            const [searchResult, setSearchResult] = useState(null); 

            // STATE FILE UPLOAD SISWA
            const [berkas, setBerkas] = useState({
                pasFoto: { name: 'pasphoto_rizky.png', type: 'image/png', previewUrl: 'https://images.unsplash.com/photo-1534528741775-53994a69daeb?auto=format&fit=crop&q=80&w=200', verified: 'approved' },
                kk: { name: 'kartu_keluarga.pdf', type: 'application/pdf', previewUrl: '#', verified: 'approved' },
                akta: { name: 'akta_kelahiran.jpg', type: 'image/jpeg', previewUrl: 'https://images.unsplash.com/photo-1544005313-94ddf0286df2?auto=format&fit=crop&q=80&w=200', verified: 'approved' },
                ktpOrtu: null, raport: null, skl: null, kip: null, pkh: null, piagam: null
            });

            // STATE DATA PENDAFTAR REALTIME (Admin Panel)
            const [pendaftarList, setPendaftarList] = useState([
                { id: '1', noDaftar: 'PPDB26-0452', nama: 'RIZKY RAMADHAN', nisn: '0112345678', jalur: 'Zonasi', tglLahir: '2013-10-12', verifikasi: 'Terverifikasi', seleksi: 'Lulus', tglDaftar: '2026-05-10' },
                { id: '2', noDaftar: 'PPDB26-0012', nama: 'AMANDA PUTRI', nisn: '0119876543', jalur: 'Prestasi', tglLahir: '2013-04-15', verifikasi: 'Terverifikasi', seleksi: 'Lulus', tglDaftar: '2026-05-11' },
                { id: '3', noDaftar: 'PPDB26-0231', nama: 'BIMA ARDIAN', nisn: '0115554443', jalur: 'Afirmasi', tglLahir: '2013-08-20', verifikasi: 'Terverifikasi', seleksi: 'Cadangan', tglDaftar: '2026-05-12' },
                { id: '4', noDaftar: 'PPDB26-0310', nama: 'CHELSEA REGINA', nisn: '0112223334', jalur: 'Perpindahan Orang Tua', tglLahir: '2013-12-05', verifikasi: 'Belum Diverifikasi', seleksi: 'Menunggu Seleksi', tglDaftar: '2026-05-14' },
                { id: '5', noDaftar: 'PPDB26-0501', nama: 'DANIEL CHRISTIAN', nisn: '0118887776', jalur: 'Zonasi', tglLahir: '2013-01-28', verifikasi: 'Ditolak', alasanTolak: 'Berkas Kartu Keluarga tidak terbaca jelas.', seleksi: 'Tidak Lulus', tglDaftar: '2026-05-15' }
            ]);

            const [rejectDialog, setRejectDialog] = useState({ isOpen: false, studentId: null, docId: null, reason: '' });

            const [adminSearch, setAdminSearch] = useState('');
            const [adminFilterJalur, setAdminFilterJalur] = useState('Semua');
            const [adminFilterStatus, setAdminFilterStatus] = useState('Semua');
            const [adminSortField, setAdminSortField] = useState('noDaftar');
            const [adminSortOrder, setAdminSortOrder] = useState('asc');

            // INISIALISASI SUPABASE KONEKSI SECARA OTOMATIS
            useEffect(() => {
                const isConfigValid = SUPABASE_URL && !SUPABASE_URL.includes("xxxxxx.supabase.co") && SUPABASE_ANON_KEY && SUPABASE_ANON_KEY !== "eyJhbGciOi...";
                if (isConfigValid) {
                    try {
                        supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
                        setIsDbConnected(true);
                        loadSettingsFromSupabase();
                    } catch (e) {
                        setIsDbConnected(false);
                    }
                } else {
                    setIsDbConnected(false);
                }
            }, []);

            const loadSettingsFromSupabase = async () => {
                if (!supabase) return;
                try {
                    const { data, error } = await supabase.from('settings').select('*').single();
                    if (data && !error) {
                        setSystemSettings({
                            schoolName: data.school_name,
                            schoolLogo: data.school_logo || '',
                            academicYear: data.academic_year,
                            quota: data.quota,
                            whatsapp: data.contact_whatsapp,
                            email: data.contact_email,
                            address: data.contact_address,
                            isOpen: data.status_ppdb
                        });
                    }
                } catch (e) {
                    console.warn("Menggunakan pengaturan default (Offline)");
                }
            };

            const handleRegister = async (e) => {
                e.preventDefault();
                const nama = e.target.nama.value;
                const email = e.target.email.value;
                const hp = e.target.hp.value;
                const password = e.target.password.value;

                if (isDbConnected && supabase) {
                    setIsLoading(true);
                    try {
                        const { data, error } = await supabase.auth.signUp({
                            email, password, options: { data: { nama_lengkap: nama, no_hp: hp } }
                        });
                        if (error) throw error;
                        alert('Registrasi akun PPDB berhasil! Cek kotak masuk email Anda untuk verifikasi.');
                        setCurrentView('login');
                    } catch (err) {
                        alert('Gagal Registrasi: ' + err.message);
                    } finally {
                        setIsLoading(false);
                    }
                } else {
                    alert('Registrasi berhasil! (Simulasi: Selamat bergabung, akun demo siap digunakan)');
                    setCurrentView('login');
                }
            };

            const handleLogin = async (e) => {
                e.preventDefault();
                const email = e.target.email.value.toLowerCase();
                const password = e.target.password.value;

                if (isDbConnected && supabase) {
                    setIsLoading(true);
                    try {
                        const { data, error } = await supabase.auth.signInWithPassword({ email, password });
                        if (error) throw error;
                        
                        const { data: profile, error: pError } = await supabase
                            .from('profiles').select('role').eq('id', data.user.id).single();

                        const userRole = profile?.role || 'siswa';
                        setUser({ name: data.user.user_metadata?.nama_lengkap || email.split('@')[0], email, role: userRole });
                        setCurrentView('dashboard');
                        
                        if (userRole === 'siswa') {
                            setActiveTab('ringkasan');
                        } else {
                            setAdminActiveTab('overview');
                        }
                    } catch (err) {
                        alert('Login Gagal: ' + err.message);
                    } finally {
                        setIsLoading(false);
                    }
                } else {
                    if (email.includes('admin') || selectedRole !== 'siswa') {
                        setUser({ name: 'Panitia Pusat PPDB', email: email, role: selectedRole });
                        setCurrentView('dashboard');
                        setAdminActiveTab('overview');
                    } else {
                        setUser({ name: 'RIZKY RAMADHAN', email: email, role: 'siswa' });
                        setCurrentView('dashboard');
                        setActiveTab('ringkasan');
                    }
                }
            };

            const handleLogout = async () => {
                if (isDbConnected && supabase) {
                    await supabase.auth.signOut();
                }
                setUser(null);
                setCurrentView('landing');
            };

            const handleBiodataChange = (e) => {
                const { name, value } = e.target;
                setBiodata(prev => ({ ...prev, [name]: value }));
            };

            const saveBiodata = async (e) => {
                e.preventDefault();
                if (isDbConnected && supabase) {
                    setIsLoading(true);
                    try {
                        const { data: { user } } = await supabase.auth.getUser();
                        const { data, error } = await supabase.from('students').upsert({
                            user_id: user.id, registration_number: 'PPDB26-0452',
                            nama_lengkap: biodata.namaLengkap, nisn: biodata.nisn, nik: biodata.nik,
                            tempat_lahir: biodata.tempatLahir, tanggal_lahir: biodata.tanggalLahir,
                            jenis_kelamin: biodata.jenisKelamin, agama: biodata.agama,
                            anak_ke: parseInt(biodata.anakKe) || 1, jumlah_saudara: parseInt(biodata.jumlahSaudara) || 0,
                            kewarganegaraan: biodata.kewarganegaraan, provinsi: biodata.provinsi,
                            kabupaten: biodata.kabupaten, kecamatan: biodata.kecamatan,
                            desa: biodata.desa, rt: biodata.rt, rw: biodata.rw, kode_pos: biodata.kodePos,
                            alamat_lengkap: biodata.alamatLengkap, nama_sekolah_asal: biodata.namaSekolahAsal,
                            npsn_sekolah: biodata.npsn, alamat_sekolah_asal: biodata.alamatSekolahAsal
                        });
                        if (error) throw error;
                        alert('Biodata berhasil disinkronisasi ke database Supabase!');
                    } catch (err) {
                        alert('Gagal menyimpan ke Supabase: ' + err.message);
                    } finally {
                        setIsLoading(false);
                    }
                } else {
                    alert('Biodata berhasil disimpan ke memori simulasi!');
                }
            };

            const handleFileUpload = async (e, docType) => {
                const file = e.target.files[0];
                if (!file) return;

                if (file.size > 5 * 1024 * 1024) {
                    alert('Ukuran file maksimal 5MB!');
                    return;
                }

                if (isDbConnected && supabase) {
                    setIsLoading(true);
                    try {
                        const fileExt = file.name.split('.').pop();
                        const fileName = `${docType}_${Date.now()}.${fileExt}`;
                        
                        const { data, error } = await supabase.storage.from('berkas-ppdb').upload(`pendaftar/${fileName}`, file);
                        if (error) throw error;

                        const { data: urlData } = supabase.storage.from('berkas-ppdb').getPublicUrl(`pendaftar/${fileName}`);
                        const publicUrl = urlData.publicUrl;

                        setBerkas(prev => ({
                            ...prev,
                            [docType]: { name: file.name, type: file.type, previewUrl: publicUrl, verified: 'pending' }
                        }));
                        alert(`Berkas ${docType} berhasil diunggah ke Supabase Storage!`);
                    } catch (err) {
                        alert('Gagal mengunggah berkas: ' + err.message);
                    } finally {
                        setIsLoading(false);
                    }
                } else {
                    const previewUrl = file.type.startsWith('image/') ? URL.createObjectURL(file) : '#';
                    setBerkas(prev => ({
                        ...prev,
                        [docType]: { name: file.name, type: file.type, previewUrl, verified: 'pending' }
                    }));
                    alert('Simulasi Unggah: File berhasil diunggah di browser!');
                }
            };

            const removeFile = (docType) => {
                setBerkas(prev => ({ ...prev, [docType]: null }));
            };

            const approveDocument = (studentId, status) => {
                setPendaftarList(prev => prev.map(p => {
                    if (p.id === studentId) return { ...p, verifikasi: status };
                    return p;
                }));
                alert(`Status pendaftar berhasil diubah menjadi: ${status}`);
            };

            const rejectDocumentSubmit = () => {
                setPendaftarList(prev => prev.map(p => {
                    if (p.id === rejectDialog.studentId) return { ...p, verifikasi: 'Ditolak', alasanTolak: rejectDialog.reason, seleksi: 'Tidak Lulus' };
                    return p;
                }));
                alert(`Pendaftaran ditolak dengan alasan: ${rejectDialog.reason}`);
                setRejectDialog({ isOpen: false, studentId: null, docId: null, reason: '' });
            };

            const setSeleksiResult = (studentId, result) => {
                setPendaftarList(prev => prev.map(p => {
                    if (p.id === studentId) return { ...p, seleksi: result };
                    return p;
                }));
            };

            const handleCekPengumuman = (e) => {
                e.preventDefault();
                const found = pendaftarList.find(p => p.noDaftar.toLowerCase() === searchNoPendaftaran.trim().toLowerCase() && p.tglLahir === searchTanggalLahir);
                if (found) { setSearchResult(found.seleksi); } else { setSearchResult('Not Found'); }
            };

            const adminStats = {
                total: pendaftarList.length,
                belumVerif: pendaftarList.filter(p => p.verifikasi === 'Belum Diverifikasi').length,
                terverif: pendaftarList.filter(p => p.verifikasi === 'Terverifikasi').length,
                lulus: pendaftarList.filter(p => p.seleksi === 'Lulus').length,
                tidakLulus: pendaftarList.filter(p => p.seleksi === 'Tidak Lulus').length,
            };

            const triggerExport = (type) => {
                alert(`[Simulasi Ekspor] Berhasil mengekspor data pendaftar ke format ${type.toUpperCase()}!`);
            };

            return (
                <div className="min-h-screen font-sans">
                    {/* LANDING PAGE VIEW */}
                    {currentView === 'landing' && (
                        <LandingPage setView={setCurrentView} settings={systemSettings} jalurList={jalurList} stats={adminStats} selectedRole={selectedRole} setSelectedRole={setSelectedRole} />
                    )}

                    {/* LOGIN & REGISTER VIEW */}
                    {currentView === 'login' && (
                        <LoginForm setView={setCurrentView} onLogin={handleLogin} role={selectedRole} setSelectedRole={setSelectedRole} />
                    )}
                    {currentView === 'register' && (
                        <RegisterForm setView={setCurrentView} onRegister={handleRegister} />
                    )}

                    {/* PORTAL PENGUMUMAN PUBLIK */}
                    {currentView === 'pengumuman-cek' && (
                        <PortalPengumuman setView={setCurrentView} searchNo={searchNoPendaftaran} setSearchNo={setSearchNoPendaftaran} searchTgl={searchTanggalLahir} setSearchTgl={setSearchTanggalLahir} onSubmit={handleCekPengumuman} result={searchResult} setResult={setSearchResult} />
                    )}

                    {/* CETAK KARTU BUKTI PENDAFTARAN */}
                    {currentView === 'cetak-bukti' && (
                        <BuktiCetak biodata={biodata} settings={systemSettings} berkas={berkas} setView={setCurrentView} />
                    )}

                    {/* PORTAL DASHBOARD UTAMA (MULTI-ROLE) */}
                    {currentView === 'dashboard' && (
                        <div className="flex h-screen bg-slate-50 overflow-hidden">
                            {/* SIDEBAR */}
                            <aside className="w-64 bg-slate-900 text-slate-300 hidden md:flex flex-col">
                                <div className="h-20 flex items-center px-6 border-b border-slate-800 gap-3 bg-slate-950">
                                    {user?.role === 'siswa' ? <Icon name="GraduationCap" className="text-blue-500" size={28} /> : <Icon name="Shield" className="text-amber-500" size={28} />}
                                    <span className="font-extrabold text-white tracking-wide text-lg">{user?.role === 'siswa' ? 'PPDB ONLINE' : 'PORTAL ADMIN'}</span>
                                </div>
                                <div className="p-6">
                                    <div className={`flex items-center gap-3 mb-6 p-3 rounded-xl border ${user?.role === 'siswa' ? 'bg-slate-800/50 border-slate-700/50' : 'bg-amber-950/20 border-amber-800/30'}`}>
                                        <div className={`w-10 h-10 rounded-full flex items-center justify-center font-bold text-white ${user?.role === 'siswa' ? 'bg-blue-600' : 'bg-amber-600'}`}>
                                            {user?.name?.charAt(0) || 'U'}
                                        </div>
                                        <div className="overflow-hidden">
                                            <p className="text-sm font-bold text-white truncate">{user?.name}</p>
                                            <p className={`text-xs truncate font-semibold capitalize mt-0.5 ${user?.role === 'siswa' ? 'text-slate-400' : 'text-amber-400 bg-amber-900/30 px-1.5 py-0.5 rounded-md inline-block'}`}>{user?.role}</p>
                                        </div>
                                    </div>
                                    <nav className="space-y-1">
                                        {user?.role === 'siswa' ? (
                                            <>
                                                <SidebarBtn icon={<Icon name="Home" size={18} />} label="Ringkasan" active={activeTab === 'ringkasan'} onClick={() => setActiveTab('ringkasan')} />
                                                <SidebarBtn icon={<Icon name="User" size={18} />} label="Biodata Peserta" active={activeTab === 'biodata'} onClick={() => setActiveTab('biodata')} />
                                                <SidebarBtn icon={<Icon name="Upload" size={18} />} label="Upload Berkas" active={activeTab === 'berkas'} onClick={() => setActiveTab('berkas')} />
                                                <SidebarBtn icon={<Icon name="Printer" size={18} />} label="Cetak Bukti" active={activeTab === 'cetak'} onClick={() => setCurrentView('cetak-bukti')} />
                                            </>
                                        ) : (
                                            <>
                                                <SidebarBtn icon={<Icon name="Home" size={18} />} label="Dashboard Utama" active={adminActiveTab === 'overview'} onClick={() => setAdminActiveTab('overview')} />
                                                {(user?.role === 'super_admin' || user?.role === 'admin_ppdb' || user?.role === 'verifikator') && (
                                                    <SidebarBtn icon={<Icon name="Users" size={18} />} label="Manajemen Pendaftar" active={adminActiveTab === 'pendaftar'} onClick={() => setAdminActiveTab('pendaftar')} />
                                                )}
                                                {(user?.role === 'super_admin' || user?.role === 'admin_ppdb') && (
                                                    <>
                                                        <SidebarBtn icon={<Icon name="Sliders" size={18} />} label="Manajemen Jalur" active={adminActiveTab === 'jalur'} onClick={() => setAdminActiveTab('jalur')} />
                                                        <SidebarBtn icon={<Icon name="CheckCircle" size={18} />} label="Pengumuman Hasil" active={adminActiveTab === 'kelulusan'} onClick={() => setAdminActiveTab('kelulusan')} />
                                                    </>
                                                )}
                                                {user?.role === 'super_admin' && (
                                                    <SidebarBtn icon={<Icon name="Settings" size={18} />} label="Pengaturan Sistem" active={adminActiveTab === 'settings'} onClick={() => setAdminActiveTab('settings')} />
                                                )}
                                            </>
                                        )}
                                    </nav>
                                </div>
                                <div className="mt-auto p-6 border-t border-slate-800">
                                    <button onClick={handleLogout} className="w-full flex items-center gap-3 px-4 py-2.5 text-sm font-medium text-red-400 hover:bg-red-950/40 rounded-xl transition-all">
                                        <Icon name="LogOut" size={18} /> Keluar Sistem
                                    </button>
                                </div>
                            </aside>

                <div className="bg-white p-6 rounded-2xl border border-slate-200 shadow-sm space-y-6">
                    <div className="flex flex-col lg:flex-row justify-between gap-4 border-b border-slate-100 pb-4">
                        <div><h2 className="text-xl font-black text-slate-900">Manajemen Verifikasi</h2><p className="text-xs text-slate-500">Daftar calon peserta didik baru beserta status kelengkapan dokumen.</p></div>
                        <div className="flex gap-2"><button onClick={() => triggerExport('pdf')} className="px-3.5 py-2 bg-slate-100 text-xs font-bold rounded-xl flex items-center gap-1.5"><Icon name="Download" size={14} /> PDF</button></div>
                    </div>
                    <div className="grid sm:grid-cols-3 gap-4">
                        <div className="relative"><Icon name="Search" className="absolute left-3.5 top-[13px] text-slate-400" size={16} /><input type="text" placeholder="Cari Nama..." value={adminSearch} onChange={(e) => setAdminSearch(e.target.value)} className="w-full pl-10 pr-4 py-2.5 border border-slate-200 rounded-xl text-xs outline-none" /></div>
                        <div className="flex items-center gap-2"><span className="text-xs font-bold text-slate-500">Jalur:</span><select value={adminFilterJalur} onChange={(e) => setAdminFilterJalur(e.target.value)} className="w-full px-3 py-2.5 border border-slate-200 rounded-xl text-xs outline-none"><option value="Semua">Semua Jalur</option><option value="Zonasi">Zonasi</option><option value="Prestasi">Prestasi</option></select></div>
                        <div className="flex items-center gap-2"><span className="text-xs font-bold text-slate-500">Status:</span><select value={adminFilterStatus} onChange={(e) => setAdminFilterStatus(e.target.value)} className="w-full px-3 py-2.5 border border-slate-200 rounded-xl text-xs outline-none"><option value="Semua">Semua Status</option><option value="Belum Diverifikasi">Belum Diverifikasi</option><option value="Terverifikasi">Terverifikasi</option><option value="Ditolak">Ditolak</option></select></div>
                    </div>
                    <div className="overflow-x-auto border border-slate-150 rounded-xl">
                        <table className="w-full text-left text-xs text-slate-600">
                            <thead className="bg-slate-50 text-slate-700 font-bold uppercase border-b border-slate-150">
                                <tr>
                                    <th onClick={() => toggleSort('noDaftar')} className="px-5 py-4 cursor-pointer">No. Daftar</th>
                                    <th onClick={() => toggleSort('nama')} className="px-5 py-4 cursor-pointer">Nama</th>
                                    <th className="px-5 py-4">Jalur</th>
                                    <th className="px-5 py-4">Status Verif</th>
                                    <th className="px-5 py-4 text-right">Aksi</th>
                                </tr>
                            </thead>
                            <tbody className="divide-y divide-slate-100">
                                {filteredList.map((p, idx) => (
                                    <tr key={idx} className="hover:bg-slate-50/50">
                                        <td className="px-5 py-4 font-mono font-bold text-slate-900">{p.noDaftar}</td>
                                        <td className="px-5 py-4 font-extrabold text-slate-900">{p.nama}</td>
                                        <td className="px-5 py-4">{p.jalur}</td>
                                        <td className="px-5 py-4"><span className={`px-2.5 py-1 rounded-full text-[10px] font-black uppercase ${p.verifikasi === 'Terverifikasi' ? 'bg-emerald-100 text-emerald-800' : p.verifikasi === 'Ditolak' ? 'bg-red-100 text-red-800' : 'bg-amber-100 text-amber-800'}`}>{p.verifikasi}</span></td>
                                        <td className="px-5 py-4 text-right">
                                            <div className="flex gap-2 justify-end">
                                                <button onClick={() => approveDocument(p.id, 'Terverifikasi')} className="p-2 text-emerald-600 hover:bg-emerald-50 rounded-lg border border-slate-200"><Icon name="Check" size={14} /></button>
                                                <button onClick={() => setRejectDialog({ isOpen: true, studentId: p.id, reason: '' })} className="p-2 text-red-600 hover:bg-red-50 rounded-lg border border-slate-200"><Icon name="X" size={14} /></button>
                                            </div>
                                        </td>
                                    </tr>
                                ))}
                            </tbody>
                        </table>
                    </div>
                </div>
            );
        }

        function AdminJalur({ jalurList, setJalurList }) {
            const updateJalurKuota = (id, field, value) => setJalurList(prev => prev.map(j => j.id === id ? { ...j, [field]: value } : j));
            const toggleJalur = (id) => setJalurList(prev => prev.map(j => j.id === id ? { ...j, aktif: !j.aktif } : j));
            return (
                <div className="bg-white p-6 rounded-2xl border border-slate-200 shadow-sm space-y-6">
                    <div><h2 className="text-xl font-black text-slate-900">Manajemen Jalur PPDB</h2></div>
                    <div className="grid sm:grid-cols-2 gap-6">
                        {jalurList.map((j) => (
                            <div key={j.id} className="p-5 border border-slate-200 rounded-xl bg-slate-50/50 space-y-4">
                                <div className="flex justify-between items-center">
                                    <span className="font-extrabold text-slate-900 text-sm">Jalur {j.nama}</span>
                                    <button onClick={() => toggleJalur(j.id)} className={`px-3 py-1 rounded-full text-[10px] font-bold ${j.aktif ? 'bg-emerald-100 text-emerald-800' : 'bg-red-100 text-red-800'}`}>{j.aktif ? 'Aktif' : 'Nonaktif'}</button>
                                </div>
                                <div className="grid grid-cols-2 gap-4">
                                    <div><label className="block text-[10px] font-bold text-slate-500 uppercase mb-1">Kuota (Siswa)</label><input type="number" value={j.kuota} onChange={(e) => updateJalurKuota(j.id, 'kuota', parseInt(e.target.value) || 0)} className="w-full px-3 py-2 border border-slate-200 rounded-lg text-xs outline-none" /></div>
                                    <div><label className="block text-[10px] font-bold text-slate-500 uppercase mb-1">Persentase</label><input type="text" value={j.kuotaPersen} onChange={(e) => updateJalurKuota(j.id, 'kuotaPersen', e.target.value)} className="w-full px-3 py-2 border border-slate-200 rounded-lg text-xs outline-none" /></div>
                                </div>
                            </div>
                        ))}
                    </div>
                </div>
            );
        }

        function AdminKelulusan({ pendaftarList, setSeleksiResult }) {
            return (
                <div className="bg-white p-6 rounded-2xl border border-slate-200 shadow-sm space-y-6">
                    <div><h2 className="text-xl font-black text-slate-900">Pengumuman & Kelulusan</h2></div>
                    <div className="overflow-x-auto border border-slate-150 rounded-xl">
                        <table className="w-full text-left text-xs text-slate-600">
                            <thead className="bg-slate-50 text-slate-700 font-bold uppercase border-b border-slate-150">
                                <tr><th className="px-5 py-4">No. Pendaftaran</th><th className="px-5 py-4">Nama Lengkap</th><th className="px-5 py-4">Status</th><th className="px-5 py-4 text-right">Tentukan Hasil</th></tr>
                            </thead>
                            <tbody className="divide-y divide-slate-100">
                                {pendaftarList.map((p, idx) => (
                                    <tr key={idx} className="hover:bg-slate-50/50">
                                        <td className="px-5 py-4 font-mono font-bold text-slate-900">{p.noDaftar}</td>
                                        <td className="px-5 py-4 font-extrabold text-slate-900">{p.nama}</td>
                                        <td className="px-5 py-4"><span className={`px-2.5 py-1 rounded-full text-[10px] font-black uppercase ${p.seleksi === 'Lulus' ? 'bg-emerald-100 text-emerald-800' : p.seleksi === 'Cadangan' ? 'bg-amber-100 text-amber-800' : p.seleksi === 'Tidak Lulus' ? 'bg-red-100 text-red-800' : 'bg-slate-100 text-slate-800'}`}>{p.seleksi}</span></td>
                                        <td className="px-5 py-4 text-right">
                                            <div className="flex gap-1.5 justify-end">
                                                <button onClick={() => setSeleksiResult(p.id, 'Lulus')} className="px-2 py-1 bg-emerald-600 text-white rounded text-[10px] uppercase">Lulus</button>
                                                <button onClick={() => setSeleksiResult(p.id, 'Tidak Lulus')} className="px-2 py-1 bg-red-600 text-white rounded text-[10px] uppercase">Gagal</button>
                                            </div>
                                        </td>
                                    </tr>
                                ))}
                            </tbody>
                        </table>
                    </div>
                </div>
            );
        }

        function AdminSettings({ settings, setSettings }) {
            const handleConfigChange = (e) => setSettings(prev => ({ ...prev, [e.target.name]: e.target.value }));
            const handleSaveConfig = (e) => { e.preventDefault(); alert('Pengaturan Disimpan!'); };
            return (
                <div className="bg-white p-6 rounded-2xl border border-slate-200 shadow-sm space-y-6">
                    <div><h2 className="text-xl font-black text-slate-900">Pengaturan Sekolah</h2></div>
                    <form onSubmit={handleSaveConfig} className="space-y-6">
                        <div className="grid sm:grid-cols-2 gap-5">
                            <FormGroup label="Nama Sekolah" name="schoolName" value={settings.schoolName} onChange={handleConfigChange} />
                            <FormGroup label="Tahun Ajaran" name="academicYear" value={settings.academicYear} onChange={handleConfigChange} />
                            <FormGroup label="Kuota Siswa" name="quota" type="number" value={settings.quota} onChange={handleConfigChange} />
                            <FormGroup label="Nomor WA" name="whatsapp" value={settings.whatsapp} onChange={handleConfigChange} />
                        </div>
                        <button type="submit" className="px-6 py-2.5 bg-blue-600 text-white font-bold rounded-xl text-xs">Simpan Konfigurasi</button>
                    </form>
                </div>
            );
        }

        function SidebarBtn({ icon, label, active, onClick }) {
            return (
                <button onClick={onClick} className={`w-full flex items-center gap-3 px-4 py-3 rounded-xl text-xs font-bold transition-all ${active ? 'bg-blue-600 text-white shadow-md' : 'text-slate-400 hover:bg-slate-800 hover:text-white'}`}>
                    {icon} {label}
                </button>
            );
        }

        function MobileTabBtn({ label, active, onClick }) {
            return (
                <button onClick={onClick} className={`px-4 py-3 text-xs font-bold whitespace-nowrap border-b-2 transition-colors ${active ? 'border-blue-600 text-blue-600' : 'border-transparent text-slate-500 hover:bg-slate-50'}`}>
                    {label}
                </button>
            );
        }

        function StatusCard({ title, status, desc, icon, color }) {
            return (
                <div className={`p-5 rounded-2xl border ${color} space-y-3`}>
                    <div className="flex items-center justify-between"><h4 className="text-xs font-bold text-slate-600 uppercase">{title}</h4>{icon}</div>
                    <div><p className="text-lg font-black text-slate-900 leading-none">{status}</p><p className="text-[10px] text-slate-500 mt-1.5">{desc}</p></div>
                </div>
            );
        }

        function FormGroup({ label, name, value, onChange, type = "text", required = false }) {
            return (
                <div className="space-y-1">
                    <label className="block text-xs font-bold text-slate-700 uppercase">{label} {required && <span className="text-red-500">*</span>}</label>
                    <input type={type} name={name} value={value} onChange={onChange} required={required} className="w-full px-4 py-2.5 bg-slate-50 border border-slate-200 rounded-xl text-sm outline-none" />
                </div>
            );
        }

        function ViewBerkas({ berkas, onUpload, onRemove }) {
            const dokumenSyarat = [
                { id: 'pasFoto', label: 'Pas Foto 3x4', type: 'Wajib', accepted: 'image/jpeg, image/png', icon: <Icon name="ImageIcon" /> },
                { id: 'kk', label: 'Kartu Keluarga', type: 'Wajib', accepted: '.pdf, image/jpeg, image/png', icon: <Icon name="FileText" /> },
                { id: 'akta', label: 'Akta Kelahiran', type: 'Wajib', accepted: '.pdf, image/jpeg, image/png', icon: <Icon name="FileText" /> },
                { id: 'ktpOrtu', label: 'KTP Orang Tua', type: 'Wajib', accepted: '.pdf, image/jpeg, image/png', icon: <Icon name="FileText" /> },
                { id: 'raport', label: 'Raport', type: 'Wajib', accepted: '.pdf', icon: <Icon name="BookOpen" /> },
                { id: 'skl', label: 'SKL', type: 'Wajib', accepted: '.pdf, image/jpeg', icon: <Icon name="GraduationCap" /> }
            ];

            return (
                <div className="animate-in fade-in slide-in-from-bottom-4 duration-500 pb-12 space-y-6">
                    <div><h2 className="text-2xl font-black text-slate-900">Upload Berkas Persyaratan</h2></div>
                    <div className="grid sm:grid-cols-2 lg:grid-cols-3 gap-6">
                        {dokumenSyarat.map((doc) => (
                            <UploadCard key={doc.id} doc={doc} fileData={berkas[doc.id]} onUpload={(e) => onUpload(e, doc.id)} onRemove={() => onRemove(doc.id)} />
                        ))}
                    </div>
                </div>
            );
        }

        function UploadCard({ doc, fileData, onUpload, onRemove }) {
            const inputId = `upload-${doc.id}`;
            const hasFile = !!fileData;

            return (
                <div className={`bg-white rounded-2xl border-2 p-5 transition-all flex flex-col justify-between ${hasFile ? 'border-emerald-500 shadow-sm shadow-emerald-100' : 'border-slate-200 border-dashed hover:border-blue-400'}`}>
                    <div className="flex justify-between items-start mb-4">
                        <div className="flex items-center gap-3">
                           <div className={`p-2 rounded-lg ${hasFile ? 'bg-emerald-100 text-emerald-600' : 'bg-blue-50 text-blue-600'}`}>{hasFile ? <Icon name="CheckCircle" size={18} /> : doc.icon}</div>
                           <div><h4 className="font-bold text-slate-800 text-xs">{doc.label}</h4></div>
                        </div>
                    </div>
                    {hasFile ? (
                        <div className="space-y-4">
                            <div className="bg-slate-50 p-3 rounded-xl border border-slate-100 flex items-center justify-between">
                                <span className="text-[10px] font-bold text-slate-600 truncate mr-2" title={fileData.name}>{fileData.name}</span>
                                <div className="flex gap-2 shrink-0"><button onClick={() => onRemove(doc.id)} className="p-1.5 text-red-600 hover:bg-red-100 rounded-md"><Icon name="Trash2" size={12} /></button></div>
                            </div>
                        </div>
                    ) : (
                        <div className="h-28 flex flex-col items-center justify-center text-center">
                           <label htmlFor={inputId} className="px-3 py-1.5 bg-blue-50 hover:bg-blue-100 text-blue-700 text-[10px] font-bold rounded-lg cursor-pointer">Pilih File</label>
                        </div>
                    )}
                    <input type="file" id={inputId} className="hidden" accept={doc.accepted} onChange={onUpload} />
                </div>
            );
        }

        function TimelineItem({ date, title, active }) {
            return (
                <div className="relative pl-7 text-xs">
                    <div className={`absolute left-0 top-[1.5px] w-6 h-6 -translate-x-[12px] rounded-full border-4 border-white ${active ? 'bg-blue-600' : 'bg-slate-300'} z-10`}></div>
                    <p className="font-extrabold text-slate-800 leading-tight">{title}</p>
                    <p className="text-[10px] text-slate-500 mt-0.5">{date}</p>
                </div>
            );
        }

        // ==========================================
        // RENDER APLIKASI KE DALAM DOM
        // ==========================================
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
